name: Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Docker credentials
        id: check_secrets
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/antigravity-manager" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract environment variables
        id: meta
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          DOCKER_IMAGE="${{ steps.check_secrets.outputs.DOCKER_IMAGE }}"
          # Get version from tag or branch
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAGS="${DOCKER_IMAGE}:latest,${DOCKER_IMAGE}:${VERSION}"
          else
            VERSION=${GITHUB_REF#refs/heads/}
            TAGS="${DOCKER_IMAGE}:${VERSION}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAGS=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.TAGS }}
          build-args: |
            USE_MIRROR=false
