name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker-setup:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      docker_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check Docker credentials
        id: check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Docker credentials configured"
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "Docker credentials not configured, skipping Docker builds"
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

  docker-build-amd64:
    needs: docker-setup
    runs-on: ubuntu-latest
    if: needs.docker-setup.outputs.docker_enabled == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (AMD64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ github.repository_owner }}/antigravity-manager:latest
            ${{ github.repository_owner }}/antigravity-manager:${{ github.ref_name }}
          build-args: |
            USE_MIRROR=false

  docker-build-arm64:
    needs: docker-setup
    runs-on: ubuntu-24.04-arm
    if: needs.docker-setup.outputs.docker_enabled == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ github.repository_owner }}/antigravity-manager:latest
            ${{ github.repository_owner }}/antigravity-manager:${{ github.ref_name }}
          build-args: |
            USE_MIRROR=false

  docker-manifest:
    needs: [docker-setup, docker-build-amd64, docker-build-arm64]
    runs-on: ubuntu-latest
    if: needs.docker-setup.outputs.docker_enabled == 'true'
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t ${{ github.repository_owner }}/antigravity-manager:latest \
            ${{ github.repository_owner }}/antigravity-manager:latest \
            ${{ github.repository_owner }}/antigravity-manager:latest

          docker buildx imagetools create -t ${{ github.repository_owner }}/antigravity-manager:${{ github.ref_name }} \
            ${{ github.repository_owner }}/antigravity-manager:${{ github.ref_name }} \
            ${{ github.repository_owner }}/antigravity-manager:${{ github.ref_name }}
